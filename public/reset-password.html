<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reimposta password — Gestaway</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#c8102e;--navy:#1a2e4a;--muted:#6b7280;--border:#e5e7eb;--light:#f8f8f8;--green:#1D9E75}
body{font-family:'Poppins',sans-serif;color:var(--navy);background:var(--light);min-height:100vh}
nav{background:var(--navy);padding:0 2rem;display:flex;align-items:center;height:64px}
nav a{text-decoration:none}
nav img{height:44px;width:auto;border-radius:6px}
.container{max-width:420px;margin:0 auto;padding:4rem 1.5rem}
.form-card{background:white;border:1px solid var(--border);border-radius:12px;padding:2.5rem}
.form-card h1{font-size:1.3rem;font-weight:700;margin-bottom:0.5rem;color:var(--navy)}
.form-card p{font-size:13px;color:var(--muted);margin-bottom:1.5rem}
.form-group{margin-bottom:1.25rem}
label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px}
input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:7px;font-size:14px;font-family:'Poppins',sans-serif;outline:none;transition:border 0.2s}
input:focus{border-color:var(--red)}
.btn-submit{width:100%;background:var(--red);color:white;border:none;padding:15px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.2s;font-family:'Poppins',sans-serif}
.btn-submit:hover{opacity:0.9}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed}
.msg{font-size:13px;margin-top:0.75rem;min-height:18px}
</style>
</head>
<body>

<nav>
  <a href="/"><img src="gestaway-logo-full.svg" alt="Gestaway"></a>
</nav>

<div class="container">
  <div class="form-card">
    <h1>Reimposta la password</h1>
    <p>Scegli una nuova password per il tuo account Gestaway.</p>
    <div class="form-group">
      <label>Nuova password</label>
      <input type="password" id="pwd1" placeholder="Almeno 8 caratteri">
    </div>
    <div class="form-group">
      <label>Conferma password</label>
      <input type="password" id="pwd2" placeholder="Ripeti la password" onkeydown="if(event.key==='Enter')confermaReset()">
    </div>
    <div id="msg" class="msg"></div>
    <button class="btn-submit" id="btn-submit" onclick="confermaReset()">Reimposta password</button>
  </div>
</div>

<script>
function getToken() {
  return new URLSearchParams(window.location.search).get('token') || '';
}
async function confermaReset() {
  const token = getToken();
  const pwd1 = document.getElementById('pwd1').value;
  const pwd2 = document.getElementById('pwd2').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn-submit');
  if (!token) { msg.style.color = 'var(--red)'; msg.textContent = 'Link non valido: token mancante.'; return; }
  if (pwd1.length < 8) { msg.style.color = 'var(--red)'; msg.textContent = 'La password deve avere almeno 8 caratteri.'; return; }
  if (pwd1 !== pwd2) { msg.style.color = 'var(--red)'; msg.textContent = 'Le due password non coincidono.'; return; }
  btn.disabled = true;
  msg.style.color = 'var(--muted)'; msg.textContent = 'Aggiornamento in corso...';
  try {
    const r = await fetch('/api/password/reset', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, password: pwd1 }) });
    const data = await r.json();
    if (r.ok) {
      msg.style.color = 'var(--green)';
      msg.textContent = 'Password aggiornata! Puoi accedere ora.';
      setTimeout(() => window.location.href = '/gestionale', 1500);
    } else {
      msg.style.color = 'var(--red)'; msg.textContent = data.error || 'Errore, il link potrebbe essere scaduto.';
      btn.disabled = false;
    }
  } catch(e) {
    msg.style.color = 'var(--red)'; msg.textContent = 'Errore di connessione.';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
