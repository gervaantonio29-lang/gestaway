<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grazie — Gestaway</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#c8102e;--navy:#1a2e4a;--muted:#6b7280}
body{font-family:'Poppins',sans-serif;color:var(--navy);background:#f8f8f8;min-height:100vh;display:flex;flex-direction:column}
nav{background:var(--navy);padding:0 2rem;display:flex;align-items:center;height:64px}
nav img{height:44px;width:auto;border-radius:6px}
.center{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:white;border-radius:16px;padding:3rem;text-align:center;max-width:500px;width:100%;box-shadow:0 8px 32px rgba(26,46,74,0.08)}
.icon{font-size:4rem;margin-bottom:1.5rem}
h1{font-size:1.8rem;font-weight:800;margin-bottom:1rem;color:var(--navy)}
p{color:var(--muted);font-size:15px;line-height:1.8;margin-bottom:1.5rem}
a{color:var(--red);text-decoration:none;font-weight:600}
</style>
</head>
<body>
<nav><a href="/"><img src="gestaway-logo.svg" alt="Gestaway"></a></nav>
<div class="center">
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Pagamento completato!</h1>
    <p>Grazie per aver scelto Gestaway. Riceverai le tue credenziali di accesso entro 24 ore lavorative all'email indicata.</p>
    <p>Per qualsiasi domanda: <a href="mailto:info@gestaway.com">info@gestaway.com</a></p>
    <a href="/">← Torna al sito</a>
  </div>
</div>
</body>
</html>
